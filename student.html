  <style>
    /* Custom Animasi untuk Elemen */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { transform: translateX(-100%); }
      to { transform: translateX(0); }
    }

    .animate-fade {
      animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .animate-slide {
      animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Hover Effects Dinamik */
    .menu-btn {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .menu-btn.active {
      background-color: rgba(255, 255, 255, 0.15);
      color: #fff;
      font-weight: 600;
      border-left: 4px solid #3b82f6;
    }

    .data-card {
      transition: all 0.3s ease;
    }

    .data-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.1);
    }
  </style>
</head>

    function authHeaders() {
      return {
        "Content-Type": "application/json",
        Authorization: `Bearer ${token}`,
      };

    function backendOfflineMessage() {
      return IS_STATIC_PREVIEW
        ? `Backend portal tidak aktif dalam static preview. Jalankan server dahulu, kemudian buka ${LOCAL_API_ORIGIN}/student-portal.`
        : "Backend tidak dapat dihubungi. Pastikan server MiCoSTSkills sedang berjalan.";
    }

    async function api(path, options = {}) {
      let res;
      try {
        res = await fetch(API + path, {
          ...options,
          headers: options.headers || authHeaders(),
        });
      } catch {
        throw new Error(backendOfflineMessage());
      }

      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "API Error");
      return data;
    }

    // ==========================================
    // REAL DATABASE AUTHENTICATION (LANGKAH 3)
    // ==========================================

    async function login() {
      const emailInput = document.getElementById("email").value.trim();
      const passwordInput = document.getElementById("password").value;
      const loginError = document.getElementById("loginError");

      if (loginError) {
        loginError.textContent = "";
        loginError.classList.add("hidden");
      }

      try {
        let res;
        try {
          res = await fetch(`${API}/api/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: emailInput, password: passwordInput }),
          });
        } catch {
          throw new Error(backendOfflineMessage());
        }
        const data = await res.json().catch(() => ({}));

        if (!res.ok || data.error) throw new Error(data.error || "Gagal berhubung dengan backend.");
        if (PORTAL_MODE === "lecturer" && data.user.role !== "lecturer" && data.user.role !== "admin") {
          throw new Error("Akaun ini bukan akaun pensyarah. Sila login melalui Student Portal SKY.");
        }
        if (PORTAL_MODE === "student" && data.user.role === "lecturer") {
          throw new Error("Akaun pensyarah perlu login melalui Lecturer Portal.");
        }

        token = data.token;
        currentUser = data.user;
        localStorage.setItem("token", token);
        localStorage.setItem("user", JSON.stringify(currentUser));

        currentActiveMenu = "dashboard";
        renderDashboard();
      } catch (e) {
        if (loginError) {
          loginError.textContent = e.message;
          loginError.classList.remove("hidden");
        } else {
          alert("❌ Gagal Log Masuk: " + e.message);
        }
      }
    }

    async function register() {
      const name = document.getElementById("rName").value.trim();
      const email = document.getElementById("rEmail").value.trim();
      const password = document.getElementById("rPassword").value;
      const program = document.getElementById("rProgram").value.trim();

      if (!name || !email || !password || !program) {
        alert("⚠️ Sila isi semua ruangan pendaftaran.");
        return;
      }

      try {
        let res;
        try {
          res = await fetch(`${API}/api/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, email, password, program }),
          });
        } catch {
          throw new Error(backendOfflineMessage());
        }
        const data = await res.json().catch(() => ({}));

        if (!res.ok || data.error) throw new Error(data.error || "Gagal berhubung dengan backend.");

        alert("🎉 " + data.message);
        document.getElementById("email").value = email;
        document.getElementById("password").value = password;
      } catch (e) {
        alert("❌ Gagal Mendaftar Pelajar: " + e.message);
      }
    }

    function scrollToPortal() {
      document.getElementById("student-portal-login")?.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function goToStudentPortal() {
      if (window.location.pathname === "/student-portal") {
        scrollToPortal();
        return;
      }

      window.location.href = IS_STATIC_PREVIEW ? "./student.html" : "/student-portal";
    }

    function goToLecturerPortal() {
      if (window.location.pathname === "/lecturer-portal") {
        scrollToPortal();
        return;
      }

      window.location.href = IS_STATIC_PREVIEW ? "./student.html?portal=lecturer" : "/lecturer-portal";
    }

    function togglePasswordVisibility() {
      const passwordInput = document.getElementById("password");
      if (!passwordInput) return;
      passwordInput.type = passwordInput.type === "password" ? "text" : "password";
    }

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      token = null;
      currentUser = null;
      renderLogin();
    }

    function goBackToPortal() {
      renderDashboard();
    }

    // ==========================================

    function escapeHTML(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function emptyState(text) {
      return `<div class="rounded-3xl border border-dashed border-slate-300 bg-white p-8 text-center text-slate-500">${text}</div>`;
    }

    function formatRM(value) {
      return `RM ${Number(value || 0).toLocaleString("ms-MY", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
    }

    function formatDate(value) {
      if (!value) return "-";
      return new Date(value).toLocaleDateString("ms-MY", { day: "2-digit", month: "short", year: "numeric" });
    }

    function financeBadge(status) {
      const key = String(status || "").toLowerCase();
      const styles = {
        paid: "bg-emerald-50 text-emerald-700",
        pending: "bg-amber-50 text-amber-700",
        overdue: "bg-red-50 text-red-700",
      };
      return `<span class="rounded-full px-3 py-1 text-xs font-black ${styles[key] || "bg-slate-100 text-slate-700"}">${escapeHTML(status || "No Record")}</span>`;
    }

    function getProgramCode(program = currentUser.program || "") {
      return Object.keys(PROGRAM_UNITS).find((code) => String(program).includes(code)) || "";
    }

    function getProgramUnits(program = currentUser.program || "") {
      return PROGRAM_UNITS[getProgramCode(program)] || [];
    }

    async function saveStudentProfile() {
      const profile = Object.fromEntries(
        STUDENT_PROFILE_FIELDS.map(([key]) => [key, document.getElementById(`edit-${key}`)?.value?.trim() || ""])
      );

      try {
        const data = await api("/api/me/profile", {
          method: "PUT",
          body: JSON.stringify({ profile }),
        });

        token = data.token;
        currentUser = data.user;
        localStorage.setItem("token", token);
        localStorage.setItem("user", JSON.stringify(currentUser));
        renderStudentSystem();
      } catch (error) {
        alert("Gagal simpan maklumat: " + error.message);
      }
    }

                    <p class="mt-1 text-sm text-slate-500">${escapeHTML(result.cu_code || "")} • ${escapeHTML(result.status || "Direkod")} • ${escapeHTML(result.score)}%</p>
                    ${result.note ? `<p class="mt-2 text-sm text-slate-600">${escapeHTML(result.note)}</p>` : ""}
                  </div>
                `).join("") : emptyState("Belum ada keputusan direkodkan.")}
              </div>
            </section>
          `
        ), "lecturer-results");
      } catch (e) {
        layout(emptyState("Gagal memuatkan keputusan: " + escapeHTML(e.message)), "lecturer-results");
      }
    }

    async function saveLecturerResult() {
      const cuSelect = document.getElementById("resultCu");
      const title = cuSelect?.selectedOptions?.[0]?.dataset?.title || cuSelect?.value || "";
      await api("/api/lecturer/results", {
        method: "POST",
        body: JSON.stringify({
          user_id: document.getElementById("resultStudent").value,
          cu_code: cuSelect.value,
          title,
          score: document.getElementById("resultScore").value,
          status: document.getElementById("resultStatus").value,
          note: document.getElementById("resultNote").value,
        }),
      });
      renderLecturerResults();
    }

    async function renderNotifications() {
      try {
        const rows = await api("/api/notifications");
        const adminForm = currentUser.role === "admin" ? `
          <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
            <div class="grid gap-3 md:grid-cols-3">
              <input id="notifTitle" placeholder="Tajuk" class="rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500" />
              <input id="notifMessage" placeholder="Mesej" class="rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500" />
              <button onclick="addNotification()" class="rounded-2xl bg-indigo-600 px-5 py-3 text-sm font-semibold text-white">Hantar Notifikasi</button>
            </div>
          </div>
        ` : "";
        layout(`<h1 class="text-3xl font-bold text-slate-900">Notifications</h1><div class="mt-6 space-y-4">${adminForm}${rows.length ? rows.map(row => `<article class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm"><h2 class="font-bold">${escapeHTML(row.title)}</h2><p class="mt-2 text-slate-600">${escapeHTML(row.message)}</p></article>`).join("") : emptyState("Belum ada notifikasi.")}</div>`, "notifications");
      } catch (e) {
        layout(emptyState("Gagal memuatkan notifikasi: " + escapeHTML(e.message)), "notifications");
      }
    }

    async function addNotification() {
      await api("/api/notifications", { method: "POST", body: JSON.stringify({ title: document.getElementById("notifTitle").value, message: document.getElementById("notifMessage").value }) });
      renderNotifications();
    }

    async function renderCMS() {
      try {
        const rows = await api("/api/cms");
        const adminForm = currentUser.role === "admin" ? `
          <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
            <div class="grid gap-3 md:grid-cols-[1fr_2fr_auto]">
              <input id="cmsTitle" placeholder="Tajuk halaman" class="rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500" />
              <input id="cmsContent" placeholder="Kandungan" class="rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500" />
              <button onclick="addCMS()" class="rounded-2xl bg-indigo-600 px-5 py-3 text-sm font-semibold text-white">Simpan</button>
            </div>
          </div>
        ` : "";
        layout(`<h1 class="text-3xl font-bold text-slate-900">Web CMS</h1><div class="mt-6 space-y-4">${adminForm}${rows.length ? rows.map(row => `<article class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm"><h2 class="font-bold">${escapeHTML(row.title)}</h2><p class="mt-2 text-slate-600">${escapeHTML(row.content)}</p></article>`).join("") : emptyState("Belum ada kandungan CMS.")}</div>`, "cms");
      } catch (e) {
        layout(emptyState("Gagal memuatkan CMS: " + escapeHTML(e.message)), "cms");
      }
    }

    async function addCMS() {
      await api("/api/cms", { method: "POST", body: JSON.stringify({ title: document.getElementById("cmsTitle").value, content: document.getElementById("cmsContent").value }) });
      renderCMS();
    }

    function renderChatbot() {
      layout(`
        <h1 class="text-3xl font-bold text-slate-900">AI Chatbot</h1>
        <div class="mt-6 rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
          <div id="chatLog" class="min-h-48 space-y-3 rounded-2xl bg-slate-50 p-4 text-slate-700"></div>
          <div class="mt-4 flex gap-3">
            <input id="chatInput" placeholder="Tanya tentang program, exam, kehadiran..." class="flex-1 rounded-2xl border border-slate-200 px-4 py-3 outline-none focus:border-indigo-500" />
            <button onclick="sendChat()" class="rounded-2xl bg-slate-900 px-5 py-3 text-sm font-semibold text-white">Hantar</button>
          </div>
        </div>
      `, "chatbot");
    }

    async function sendChat() {
      const input = document.getElementById("chatInput");
      const log = document.getElementById("chatLog");
      const message = input.value.trim();
      if (!message) return;
      log.innerHTML += `<p><strong>Anda:</strong> ${escapeHTML(message)}</p>`;
      input.value = "";
      const data = await api("/api/chatbot", { method: "POST", body: JSON.stringify({ message }) });
      log.innerHTML += `<p><strong>MiCoST AI:</strong> ${escapeHTML(data.reply)}</p>`;
    }

    async function renderAdmin() {
      try {
        const users = await api("/api/users");
        layout(`
          <h1 class="text-3xl font-bold text-slate-900">Admin Panel</h1>
          <div class="mt-6 rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
            ${users.length ? users.map(user => `<div class="flex flex-wrap items-center justify-between gap-3 border-b border-slate-100 py-3 last:border-0"><span class="font-semibold">${escapeHTML(user.name)}</span><span class="text-sm text-slate-500">${escapeHTML(user.email)} - ${escapeHTML(user.role)} - ${escapeHTML(user.program || "Umum")}</span></div>`).join("") : emptyState("Belum ada pengguna.")}
          </div>
        `, "admin");
      } catch (e) {
        layout(emptyState("Gagal memuatkan admin panel: " + escapeHTML(e.message)), "admin");
      }
    }

    if (token && currentUser && PORTAL_MODE === "lecturer" && currentUser.role !== "lecturer" && currentUser.role !== "admin") {
      logout();
    } else if (token && currentUser && PORTAL_MODE === "student" && currentUser.role === "lecturer") {
      logout();
    } else if (token && currentUser) {
      renderDashboard();
    } else {
      renderLogin();
    }
  </script>
</body>
</html>
